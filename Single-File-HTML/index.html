<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>phyro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --fg: #000000;
    --muted: #888888;
    --border: #e0e0e0;
    --hover: #f5f5f5;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    height: 48px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-shrink: 0;
  }

  #home-btn {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--fg);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.1s;
    flex-shrink: 0;
  }
  #home-btn:hover { background: var(--hover); }

  #url-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    max-width: 640px;
  }
  #url-wrap:focus-within { border-color: var(--fg); }

  #url-input {
    flex: 1;
    border: none;
    outline: none;
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    background: transparent;
    color: var(--fg);
  }
  #url-input::placeholder { color: var(--muted); }

  #go-btn {
    background: var(--fg);
    color: var(--bg);
    border: none;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.1s;
  }
  #go-btn:hover { opacity: 0.75; }

  #proxy-select {
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: none;
    border-left: 1px solid var(--border);
    padding: 8px 8px;
    cursor: pointer;
    font-family: inherit;
    outline: none;
  }

  /* ── MAIN CONTENT ── */
  #content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* ── HOME PAGE ── */
  #home-page {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  #home-page h1 {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -2px;
    color: var(--fg);
  }

  #home-search {
    display: flex;
    border: 1.5px solid var(--fg);
    border-radius: 10px;
    overflow: hidden;
    width: 100%;
    max-width: 480px;
  }
  #home-input {
    flex: 1;
    border: none;
    outline: none;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    background: transparent;
  }
  #home-input::placeholder { color: var(--muted); }
  #home-go {
    background: var(--fg);
    color: var(--bg);
    border: none;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  #home-go:hover { opacity: 0.8; }

  .note {
    font-size: 11px;
    color: var(--muted);
    max-width: 380px;
    text-align: center;
    line-height: 1.5;
  }

  /* ── PROXY VIEW ── */
  #proxy-view {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
  }
  #proxy-view.active { display: flex; }

  #proxy-frame {
    flex: 1;
    border: none;
    width: 100%;
    background: white;
  }

  /* ── STATES ── */
  #status-overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--bg);
  }
  #status-overlay.active { display: flex; }

  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--fg);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #status-msg { font-size: 13px; color: var(--muted); }
  #status-detail { font-size: 12px; color: var(--muted); max-width: 400px; text-align: center; line-height: 1.5; }

  #retry-btn {
    background: var(--fg);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    display: none;
  }
  #retry-btn:hover { opacity: 0.75; }

</style>
</head>
<body>

<div id="topbar">
  <button id="home-btn">phyro</button>
  <div id="url-wrap">
    <input id="url-input" type="text" placeholder="Search or enter URL" autocomplete="off" spellcheck="false">
    <select id="proxy-select" title="CORS Proxy">
      <option value="0">proxy 1</option>
      <option value="1">proxy 2</option>
      <option value="2">proxy 3</option>
    </select>
    <button id="go-btn">Go</button>
  </div>
</div>

<div id="content">

  <div id="home-page">
    <h1>phyro</h1>
    <div id="home-search">
      <input id="home-input" type="text" placeholder="Search or enter a URL…" autocomplete="off">
      <button id="home-go">Go</button>
    </div>

  </div>

  <div id="proxy-view">
    <iframe id="proxy-frame" sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-top-navigation"></iframe>
  </div>

  <div id="status-overlay">
    <div class="spinner" id="spinner"></div>
    <div id="status-msg">Loading…</div>
    <div id="status-detail"></div>
    <button id="retry-btn" onclick="retryLoad()">Try next proxy</button>
  </div>

</div>

<script>
const PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${encodeURIComponent(url)}`,
];

let currentUrl = '';
let currentProxy = 0;
let blobUrl = null;

// ── PARSE INPUT ──
function parseInput(raw) {
  raw = raw.trim();
  if (!raw) return null;
  if (!raw.includes('.') || raw.includes(' ')) {
    return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
  }
  if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
  return raw;
}

// ── NAVIGATE ──
function go(input) {
  const url = parseInput(input || document.getElementById('home-input').value || document.getElementById('url-input').value);
  if (!url) return;
  currentUrl = url;
  currentProxy = parseInt(document.getElementById('proxy-select').value) || 0;
  document.getElementById('url-input').value = url;
  fetchAndLoad(url, currentProxy);
}

function retryLoad() {
  currentProxy = (currentProxy + 1) % PROXIES.length;
  document.getElementById('proxy-select').value = currentProxy;
  fetchAndLoad(currentUrl, currentProxy);
}

// ── FETCH & LOAD ──
function fetchAndLoad(url, proxyIdx) {
  showStatus('loading', `Fetching via proxy ${proxyIdx + 1}…`);

  const proxyUrl = PROXIES[proxyIdx](url);

  fetch(proxyUrl)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    })
    .then(html => {
      const rewritten = rewriteHtml(html, url);

      // Revoke old blob
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      blobUrl = URL.createObjectURL(new Blob([rewritten], { type: 'text/html' }));

      const frame = document.getElementById('proxy-frame');
      frame.src = blobUrl;

      showProxy();

      frame.onload = () => {
        try {
          const t = frame.contentDocument?.title;
          if (t) document.getElementById('url-input').value = url;
        } catch(e) {}
      };
    })
    .catch(err => {
      showStatus('error', 'Failed to load page', `${err.message}. Try switching to a different proxy.`);
    });
}

// ── HTML REWRITING ──
function rewriteHtml(html, baseUrl) {
  let base;
  try { base = new URL(baseUrl); } catch(e) { return html; }

  // Remove existing base tags
  html = html.replace(/<base[^>]*>/gi, '');
  // Inject our base tag + error suppressor
  const inject = `<base href="${baseUrl}">
<script>
window.addEventListener('error', function(e){ e.stopImmediatePropagation(); }, true);
// Suppress history errors
const _replace = history.replaceState.bind(history);
const _push = history.pushState.bind(history);
history.replaceState = function(){ try { _replace.apply(this, arguments); } catch(e){} };
history.pushState = function(){ try { _push.apply(this, arguments); } catch(e){} };
<\/script>`;

  // Inject after <head> or at top
  if (/<head[^>]*>/i.test(html)) {
    html = html.replace(/<head([^>]*)>/i, `<head$1>${inject}`);
  } else if (/<html[^>]*>/i.test(html)) {
    html = html.replace(/<html([^>]*)>/i, `<html$1><head>${inject}</head>`);
  } else {
    html = inject + html;
  }

  // Strip CSP
  html = html.replace(/<meta[^>]+http-equiv=["']?content-security-policy["']?[^>]*\/?>/gi, '');

  // Rewrite all src/href/action attributes that are absolute to go through proxy
  // (Only rewrite links that look like navigable pages — not assets)
  html = html.replace(/(<a\s[^>]*href=["'])(?!#|javascript|mailto|tel)(https?:\/\/[^"']+)(["'])/gi, (m, pre, url, post) => {
    return `${pre}javascript:parent.go('${url.replace(/'/g,"\\'")}')${post}`;
  });

  return html;
}

// ── UI STATE ──
function showProxy() {
  document.getElementById('home-page').style.display = 'none';
  document.getElementById('status-overlay').classList.remove('active');
  document.getElementById('proxy-view').classList.add('active');
}

function showHome() {
  document.getElementById('home-page').style.display = '';
  document.getElementById('proxy-view').classList.remove('active');
  document.getElementById('status-overlay').classList.remove('active');
  document.getElementById('url-input').value = '';
  document.getElementById('home-input').value = '';
}

function showStatus(type, msg, detail) {
  document.getElementById('home-page').style.display = 'none';
  document.getElementById('proxy-view').classList.remove('active');
  const overlay = document.getElementById('status-overlay');
  overlay.classList.add('active');
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('status-detail').textContent = detail || '';
  document.getElementById('spinner').style.display = type === 'loading' ? '' : 'none';
  document.getElementById('retry-btn').style.display = type === 'error' ? '' : 'none';
}

// ── EVENTS ──
document.getElementById('home-btn').onclick = showHome;
document.getElementById('go-btn').onclick = () => go(document.getElementById('url-input').value);
document.getElementById('home-go').onclick = () => go(document.getElementById('home-input').value);

document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') go(e.target.value); });
document.getElementById('home-input').addEventListener('keydown', e => { if (e.key === 'Enter') go(e.target.value); });

document.getElementById('proxy-select').onchange = function() {
  currentProxy = parseInt(this.value);
  if (currentUrl) fetchAndLoad(currentUrl, currentProxy);
};

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
    e.preventDefault();
    document.getElementById('url-input').select();
  }
});

// ── INIT ──
document.getElementById('home-input').focus();
</script>
</body>
</html>
